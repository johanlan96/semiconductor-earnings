<html lang="zh-CN">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
  :root {
    --primary: #1a1f36;
    --accent: #4f6ef7;
    --accent2: #8b5cf6;
    --green: #10b981;
    --red: #ef4444;
    --orange: #f59e0b;
    --yellow: #fbbf24;
    --card-bg: #ffffff;
    --page-bg: #f0f2f8;
    --border: #e2e8f0;
    --text: #1e293b;
    --muted: #64748b;
    --banner-bg: #1a1f36;
    --tag-chip-bg: #eff6ff;
    --tag-chip-text: #2563eb;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 32px rgba(0,0,0,0.14);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
    background: var(--page-bg);
    color: var(--text);
    min-height: 100vh;

  /* ─── 顶部横幅 ─── */
  #banner {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--banner-bg);
    color: #fff;
    padding: 10px 20px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.3);
  }
  .banner-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-wrap: wrap;
  }
  .banner-date {
    font-size: 13px;
    color: #94a3b8;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .banner-label {
    font-size: 12px;
    color: #7c8db5;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .banner-companies {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex: 1;
  }
  .banner-chip {
    background: rgba(79,110,247,0.18);
    border: 1px solid rgba(79,110,247,0.4);
    border-radius: 20px;
    padding: 3px 11px;
    font-size: 12px;
    cursor: pointer;
    transition: background 0.15s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 5px;
  }
  .banner-chip:hover { background: rgba(79,110,247,0.35); }
  .banner-chip .days-badge {
    background: var(--orange);
    color: #fff;
    border-radius: 10px;
    padding: 1px 6px;
    font-size: 10px;
    font-weight: 600;

  .banner-chip.today-chip { border-color: var(--green); background: rgba(16,185,129,0.15); }
  .banner-chip.today-chip .days-badge { background: var(--green); }
  .banner-no-upcoming { font-size: 12px; color: #475569; }

  /* ─── 主标题 ─── */
  .page-header {
    max-width: 1400px;
    margin: 24px auto 0;
    padding: 0 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  .page-title {
    font-size: 22px;
    font-weight: 700;
    color: var(--primary);
  }
  .page-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }

  /* ─── 筛选栏 ─── */
  .filter-bar {
    max-width: 1400px;
    margin: 16px auto 0;
    padding: 0 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-box {
    flex: 1;
    min-width: 200px;
    max-width: 300px;
    padding: 8px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 13px;
    outline: none;
    background: #fff;
    transition: border-color 0.15s;

  .search-box:focus { border-color: var(--accent); }
  .filter-tabs { display: flex; gap: 6px; flex-wrap: wrap; }
  .filter-tab {
    padding: 7px 14px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: #fff;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    color: var(--muted);
  }
  .filter-tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .filter-tab:hover:not(.active) { border-color: var(--accent); color: var(--accent); }
  .sector-filter select {
    padding: 7px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
    background: #fff;
    outline: none;
    cursor: pointer;
  }

  /* ─── 卡片网格 ─── */
  .cards-grid {
    max-width: 1400px;
    margin: 20px auto 40px;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 16px;
  }

  /* ─── 单个卡片 ─── */
  .card {
    background: var(--card-bg);
    border-radius: 14px;
    border: 1.5px solid var(--border);
    padding: 18px;
    cursor: pointer;
    transition: box-shadow 0.2s, transform 0.15s, border-color 0.2s;
    box-shadow: var(--shadow);
    scroll-margin-top: 80px;
  }
  .card:hover {
    box-shadow: var(--shadow-lg);
    transform: translateY(-2px);
  }
  .card.soon { border-color: var(--orange) !important; }
  .card.today-release { border-color: var(--green) !important; box-shadow: 0 0 0 2px rgba(16,185,129,0.2); }

  .card-header { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
  .card-name-block { flex: 1; min-width: 0; }
  .card-name { font-size: 15px; font-weight: 700; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-ticker { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .card-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }

  .quarter-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    background: var(--tag-chip-bg);
    color: var(--tag-chip-text);
    white-space: nowrap;
  }
  .status-badge {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 10px;
    white-space: nowrap;
  }

  .status-badge.upcoming { background: #fff7ed; color: #c2410c; }
  .status-badge.today { background: #dcfce7; color: #15803d; }
  .status-badge.pending { background: #f1f5f9; color: #64748b; }

    padding: 2px 7px;
    border-radius: 6px;
    background: #f8f0ff;
    color: var(--accent2);
    margin-bottom: 6px;
    display: inline-block;
  }

  .card-metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .metric-item { }
  .metric-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
  .metric-value { font-size: 14px; font-weight: 600; color: var(--text); }
  .metric-value.pos { color: var(--green); }
  .metric-value.neg { color: var(--red); }

  .card-pending-info { text-align: center; padding: 10px 0; }
  .pending-date { font-size: 13px; color: var(--text); font-weight: 600; }
  .pending-countdown { font-size: 22px; font-weight: 700; color: var(--accent); margin-top: 4px; }
  .pending-countdown.today-text { color: var(--green); }
  .pending-countdown.soon-text { color: var(--orange); }
  .pending-subtitle { font-size: 11px; color: var(--muted); margin-top: 2px; }

  .card-track { font-size: 11px; color: var(--muted); margin-top: 8px; line-height: 1.5; }

  /* ─── 空状态 ─── */
  .empty-state {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }
  .empty-state h3 { font-size: 18px; margin-bottom: 8px; }

  /* ─── 弹窗 ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: #fff;
    border-radius: 20px;
    max-width: 760px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    box-shadow: var(--shadow-lg);
    animation: slideUp 0.2s ease;

  .modal-header {
    padding: 24px 28px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
  }
  .modal-title { font-size: 20px; font-weight: 700; }
  .modal-subtitle { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .modal-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: none;
    background: var(--page-bg);
    cursor: pointer;
    font-size: 18px;
    color: var(--muted);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .modal-close:hover { background: var(--border); }

  .modal-body { padding: 20px 28px 28px; }

  .modal-section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
    margin-top: 20px;
  }
  .modal-section-title:first-child { margin-top: 0; }

  .metrics-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .metrics-table th {
    text-align: left;
    padding: 8px 12px;
    background: var(--page-bg);
    color: var(--muted);
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
  }
  .metrics-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .metrics-table tr:last-child td { border-bottom: none; }
  .yoy-pos { color: var(--green); font-weight: 600; }
  .yoy-neg { color: var(--red); font-weight: 600; }

  .guidance-card {
    background: linear-gradient(135deg, #eff6ff, #f8f0ff);
    border: 1px solid #c7d2fe;
    border-radius: 12px;
    padding: 16px 18px;
    margin-top: 8px;
  }
  .guidance-title { font-size: 12px; color: var(--accent); font-weight: 600; margin-bottom: 8px; }
  .guidance-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .guidance-item { }
  .guidance-label { font-size: 11px; color: var(--muted); }
  .guidance-value { font-size: 14px; font-weight: 700; color: var(--text); }

  .highlights-list { list-style: none; }
  .highlights-list li {
    padding: 8px 0;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    line-height: 1.6;
    display: flex;
    gap: 8px;
  }
  .highlights-list li:last-child { border-bottom: none; }
  .highlights-list li::before { content: '•'; color: var(--accent); font-size: 16px; flex-shrink: 0; line-height: 1.5; }

  .chart-container { position: relative; height: 220px; margin-top: 8px; }

  .fx-note {
    font-size: 11px;
    color: var(--muted);
    background: #f8fafc;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    margin-top: 12px;
    line-height: 1.6;
  }

  .pending-modal-info {
    text-align: center;
    padding: 30px 20px;
    background: var(--page-bg);
    border-radius: 12px;
  }
  .pending-modal-date { font-size: 20px; font-weight: 700; margin-bottom: 8px; }
  .pending-modal-countdown { font-size: 36px; font-weight: 800; color: var(--accent); }
  .pending-modal-note { font-size: 12px; color: var(--muted); margin-top: 8px; }

  /* ─── 统计条 ─── */
  .stats-bar {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .stat-pill {
    background: #fff;
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 6px 14px;
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .stat-pill strong { color: var(--text); }
  .stat-dot { width: 8px; height: 8px; border-radius: 50%; }

  /* ─── 响应式 ─── */
  @media (max-width: 600px) {
    .cards-grid { grid-template-columns: 1fr 1fr; }
    .modal { border-radius: 14px; }
    .modal-header, .modal-body { padding: 16px 18px; }
    .guidance-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 400px) {
    .cards-grid { grid-template-columns: 1fr; }
  }
</style>
</head>

  if (!str) return null;
  const d = new Date(str);
  d.setHours(0,0,0,0);
  return d;
}

function daysFromToday(dateStr) {
  const d = parseDate(dateStr);
  if (!d) return null;
  return Math.round((d - TODAY) / 86400000);
}

// ════════════════════════════════════════════════
// 工具函数
// ════════════════════════════════════════════════

function formatDate(str) {
  const d = parseDate(str);
  if (!d) return '-';
  return `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日`;
}

function getStatus(company) {
  if (company.status === 'released') return 'released';
  const days = daysFromToday(company.releaseDate);
  if (days === 0) return 'today';
  if (days !== null && days > 0 && days <= 3) return 'upcoming';
  return 'pending';
}

function getCountdownText(company) {
  const days = daysFromToday(company.releaseDate);
  if (days === 0) return { text: '🎯 今天发布', cls: 'today-text' };
  if (days === 1) return { text: '明天发布', cls: 'soon-text' };
  if (days < 0) return { text: `${Math.abs(days)}天前发布`, cls: '' };
  return { text: `还有 ${days} 天`, cls: days <= 7 ? 'soon-text' : '' };
}

function getRevDisplay(company) {
  if (company.status !== 'released') return '—';
  const r = company.released;
  if (!r) return '—';
  if (company.revIsUSD) {
    // 已换算为USD亿，优先使用revUSD字段
    const val = (r.revUSD !== undefined) ? r.revUSD : r.rev;
    return `$${(+val).toFixed(1)}亿`;
  }
  if (company.currency === 'USD') {
    return `$${r.rev.toFixed(1)}亿`;
  }
  if (company.currency === 'TWD') {
    return `$${(r.rev * 0.031).toFixed(1)}亿`;
  }
  if (company.currency === 'EUR') {
    // 卡片显示欧元原始值 + USD换算
    const usd = (r.revUSD !== undefined) ? r.revUSD : (r.rev * 1.08);
    return `€${r.rev.toFixed(1)}亿 <span style="color:var(--muted);font-size:11px">($${(+usd).toFixed(1)}亿)</span>`;
  }
  return `${r.rev}亿`;
}

function getRevDisplayFull(company) {
  if (company.status !== 'released') return '—';
  const r = company.released;
  if (!r) return '—';
  if (company.revIsUSD) {
    const val = (r.revUSD !== undefined) ? r.revUSD : r.rev;
    // 对台积电等，同时显示原始台币金额
    if (company.currency === 'TWD') {
      return `NT$${r.rev.toLocaleString()}亿 → $${(+val).toFixed(2)}亿 USD`;
    }
    return `$${(+val).toFixed(2)}亿 USD`;
  }
  if (company.currency === 'USD') return `$${r.rev.toFixed(2)}亿 USD`;
  if (company.currency === 'TWD') return `NT$${r.rev.toFixed(0)}亿 → $${(r.rev*0.031).toFixed(2)}亿 USD`;
  if (company.currency === 'EUR') return `€${r.rev.toFixed(2)}亿 → $${(r.rev*1.08).toFixed(2)}亿 USD`;
  return `${r.rev}亿`;
}

function getNetIncomeDisplay(company) {
  if (company.status !== 'released' || !company.released) return '—';
  const r = company.released;
  let ni = r.netIncome;
  if (ni === null || ni === undefined) return '—';
  if (company.revIsUSD) return `$${ni.toFixed(2)}亿 USD`;
  if (company.currency === 'TWD') return `$${(ni*0.031).toFixed(2)}亿 USD`;
  if (company.currency === 'EUR') return `$${(ni*1.08).toFixed(2)}亿 USD`;
  return `$${ni.toFixed(2)}亿 USD`;
}

// 渲染函数

// 顶部横幅
function renderBanner() {
  const now = new Date();
  document.getElementById('bannerDate').textContent =
    `${now.getFullYear()}年${now.getMonth()+1}月${now.getDate()}日`;

  const bannerList = COMPANIES.filter(c => {
    const days = daysFromToday(c.releaseDate);
    return days !== null && days >= 0 && days <= 14 && c.status !== 'released';
  }).sort((a,b) => daysFromToday(a.releaseDate) - daysFromToday(b.releaseDate));

  const container = document.getElementById('bannerCompanies');
  if (!bannerList.length) {
    container.innerHTML = '<span class="banner-no-upcoming">未来2周暂无待发布财报</span>';
    return;
  }
  container.innerHTML = bannerList.map(c => {
    const days = daysFromToday(c.releaseDate);
    const isToday = days === 0;
    const badge = isToday ? '今天' : `${days}天后`;
    return `<span class="banner-chip ${isToday?'today-chip':''}" onclick="scrollToCard('${c.id}')">
      ${c.ticker} <span class="days-badge">${badge}</span>
    </span>`;
  }).join('');
}

function scrollToCard(id) {
  const el = document.getElementById('card-' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// 统计条
function renderStats(data) {
  const total = data.length;
  const released = data.filter(c => c.status === 'released').length;
  const pending = data.filter(c => {
    const s = getStatus(c);
    return s === 'pending' || s === 'upcoming' || s === 'today';
  }).length;
  document.getElementById('statsBar').innerHTML = `
    <div class="stat-pill"><span class="stat-dot" style="background:#4f6ef7"></span>共 <strong>${total}</strong> 家公司</div>
    <div class="stat-pill"><span class="stat-dot" style="background:#10b981"></span>已发布 <strong>${released}</strong> 家</div>
    <div class="stat-pill"><span class="stat-dot" style="background:#f59e0b"></span>待发布 <strong>${pending}</strong> 家</div>
  `;
}

// 渲染单张卡片
function renderCard(company) {
  const status = getStatus(company);
  const countdown = getCountdownText(company);
  const days = daysFromToday(company.releaseDate);
  const isSoon = status === 'upcoming';
  const isToday = status === 'today';

  let cardClass = 'card';
  if (isSoon) cardClass += ' soon';
  if (isToday) cardClass += ' today-release';

  let statusBadge = '';
  if (status === 'released') statusBadge = '<span class="status-badge released">✅ 已发布</span>';
  else if (status === 'today') statusBadge = '<span class="status-badge today">🎯 今天</span>';
  else if (status === 'upcoming') statusBadge = '<span class="status-badge upcoming">⚡ 即将发布</span>';
  else statusBadge = '<span class="status-badge pending">🕐 待发布</span>';

  let bodyHTML = '';
  if (status === 'released' && company.released) {
    const r = company.released;
    const revDisplay = getRevDisplay(company);
    const gmDisplay = r.grossMargin !== null && r.grossMargin !== undefined ? `${r.grossMargin.toFixed(1)}%` : '—';
    const epsDisplay = r.eps !== null && r.eps !== undefined ? `$${r.eps.toFixed(2)}` : '—';
    const niDisplay = r.netIncome !== null && r.netIncome !== undefined
      ? (company.currency === 'TWD' ? `$${(r.netIncome*0.031).toFixed(1)}亿` :
         company.currency === 'EUR' ? `$${(r.netIncome*1.08).toFixed(1)}亿` :
         `$${r.netIncome.toFixed(1)}亿`)
      : '—';

    bodyHTML = `
      <div class="card-metrics">
        <div class="metric-item">
          <div class="metric-label">营收 (USD)</div>
          <div class="metric-value">${revDisplay}</div>
        </div>
        <div class="metric-item">
          <div class="metric-label">同比</div>
          <div class="metric-value ${r.revYoY && r.revYoY.startsWith('+') ? 'pos' : (r.revYoY && r.revYoY.startsWith('-') ? 'neg' : '')}">${r.revYoY || '—'}</div>
        </div>
        <div class="metric-item">
          <div class="metric-label">毛利率</div>
          <div class="metric-value">${gmDisplay}</div>
        </div>
        <div class="metric-item">
          <div class="metric-label">Non-GAAP EPS</div>
          <div class="metric-value">${epsDisplay}</div>
        </div>
      </div>`;
  } else {
    bodyHTML = `
      <div class="card-pending-info">
        <div class="pending-date">📅 ${formatDate(company.releaseDate)}</div>
        <div class="pending-countdown ${countdown.cls}">${countdown.text}</div>
        <div class="pending-subtitle">${company.quarter} 财报</div>
      </div>`;
  }

  return `
    <div class="${cardClass}" id="card-${company.id}" onclick="openModal('${company.id}')">
      <div class="card-header">
        <div class="card-name-block">
          <div class="card-name">${company.nameCN}</div>
          <div class="card-ticker">${company.ticker} · ${company.nameEN}</div>
        </div>
        <div class="card-badges">
          ${statusBadge}
          <span class="quarter-badge">${company.quarter}</span>
        </div>
      </div>
      <span class="sector-tag">${company.sector}</span>
      <div class="card-divider"></div>
      ${bodyHTML}
      <div class="card-track">${company.track}</div>
    </div>`;
}

// 渲染卡片网格
let currentFilter = 'all';
let currentSector = 'all';
let currentSearch = '';

function renderGrid() {
  let data = COMPANIES.filter(c => {
    const status = getStatus(c);
    // 状态筛选
    if (currentFilter === 'released' && status !== 'released') return false;
    if (currentFilter === 'upcoming' && status !== 'upcoming' && status !== 'today') return false;
    if (currentFilter === 'pending' && status !== 'pending' && status !== 'today') return false;
    // 赛道筛选
    if (currentSector !== 'all' && c.sector !== currentSector) return false;
    // 搜索筛选
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      if (!c.nameCN.includes(currentSearch) &&
          !c.nameEN.toLowerCase().includes(q) &&
          !c.ticker.toLowerCase().includes(q)) return false;
    }
    return true;
  });

  renderStats(data);

  const grid = document.getElementById('cardsGrid');
  if (!data.length) {
    grid.innerHTML = `<div class="empty-state"><h3>暂无匹配结果</h3><p>请尝试修改筛选条件</p></div>`;
    return;
  }
  grid.innerHTML = data.map(renderCard).join('');
}

            <div class="guidance-item"><div class="guidance-label">EPS 预期</div><div class="guidance-value">${company.guidance.eps || '—'}</div></div>
          </div>
          <div style="margin-top:8px;font-size:12px;color:#64748b">${company.guidance.note || ''}</div>
        </div>`;
    }

    if (company.highlights && company.highlights.length) {
      html += `<div class="modal-section-title">近期动态</div>
        <ul class="highlights-list">
          ${company.highlights.map(h => `<li>${h}</li>`).join('')}
        </ul>`;
    }
  }

  // 12季营收走势图
  const validHistory = company.history.map((v, i) => ({ v, l: company.historyLabels[i] })).filter(x => x.v !== null);
  if (validHistory.length >= 3) {
    html += `<div class="modal-section-title">近期营收走势（亿 USD）</div>
      <div class="chart-container"><canvas id="revenueChart"></canvas></div>`;
  }

  body.innerHTML = html;

  // 渲染图表
  if (validHistory.length >= 3) {
    const ctx = document.getElementById('revenueChart').getContext('2d');
    const labels = validHistory.map(x => x.l);
    const vals = validHistory.map(x => {
      let v = x.v;
      if (company.currency === 'TWD' && !company.revIsUSD) v = +(v * 0.031).toFixed(2);
      else if (company.currency === 'EUR' && !company.revIsUSD) v = +(v * 1.08).toFixed(2);
      return v;
    });

    const maxVal = Math.max(...vals);
    const colors = vals.map((v, i) => {
      if (i === vals.length - 1) return 'rgba(79,110,247,0.9)';
      return v === maxVal ? 'rgba(139,92,246,0.8)' : 'rgba(79,110,247,0.55)';
    });

    activeChart = new Chart(ctx, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data: vals,
          backgroundColor: colors,
          borderRadius: 5,
          borderSkipped: false,
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: ctx => `$${ctx.raw.toFixed(1)}亿 USD`,
            }
          }
        },
        scales: {
          y: {
            beginAtZero: false,
            grid: { color: '#f1f5f9' },
            ticks: {
              callback: v => `$${v}亿`,
              font: { size: 10 },
            }
          },
          x: {
            grid: { display: false },
            ticks: { font: { size: 10 } }
          }
        }
      }
    });
  }

  document.getElementById('modalOverlay').classList.add('show');
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  if (activeChart) { activeChart.destroy(); activeChart = null; }
}

// ════════════════════════════════════════════════
// 事件绑定
// ════════════════════════════════════════════════
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

document.querySelectorAll('.filter-tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    tab.classList.add('active');
    currentFilter = tab.dataset.filter;
    renderGrid();
  });
});

document.getElementById('sectorSelect').addEventListener('change', e => {
  currentSector = e.target.value;
  renderGrid();
});

document.getElementById('searchInput').addEventListener('input', e => {
  currentSearch = e.target.value.trim();
  renderGrid();
});

// 键盘关闭
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ════════════════════════════════════════════════
// 初始化
// ════════════════════════════════════════════════
renderBanner();
renderGrid();
</script>
</body>
</html>
