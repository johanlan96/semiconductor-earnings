<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>半导体财报季追踪看板</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="top-banner" id="topBanner">
        <div class="banner-inline">
          <div class="banner-date" id="currentDate"></div>
          <div class="banner-divider">·</div>
          <div class="banner-label">未来 2 周财报</div>
          <div class="upcoming-list" id="upcomingList"></div>
        </div>
      </header>

      <main class="content">
        <section class="hero-panel">
          <div class="hero-copy">
            <h1>纳斯达克半导体财报追踪</h1>
            <p id="heroMeta"></p>
          </div>
        </section>

        <section class="controls-panel">
          <div class="controls">
            <label class="search-box">
              <input
                id="searchInput"
                type="search"
                placeholder="搜索公司名 / Ticker..."
                autocomplete="off"
              />
            </label>
            <div class="filter-group">
              <div class="filter-buttons" id="statusFilters">
                <button class="filter-button active" data-status="all">全部 <span id="visibleCount">0</span></button>
                <button class="filter-button" data-status="released">已发布 <span id="releasedCount">0</span></button>
                <button class="filter-button" data-status="upcoming">即将发布 <span id="upcomingCount">0</span></button>
                <button class="filter-button" data-status="pending">待发布 <span id="pendingCount">0</span></button>
              </div>
            </div>
          </div>
        </section>

        <section class="cards-grid" id="cardsGrid" aria-live="polite"></section>
      </main>
    </div>

    <div class="modal hidden" id="detailModal" aria-hidden="true">
      <div class="modal-backdrop" id="modalBackdrop"></div>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
        <button class="modal-close" id="modalClose" aria-label="关闭详情">×</button>
        <div class="modal-header">
          <div>
            <h2 id="modalTitle"></h2>
            <p class="modal-subtitle" id="modalSubtitle"></p>
          </div>
          <div class="modal-quarter-stack">
            <div class="status-pill" id="modalStatus"></div>
            <div class="modal-quarter" id="modalQuarter"></div>
          </div>
        </div>
        <div class="modal-body">
          <section class="detail-block">
            <h3 id="metricsHeading">核心数据</h3>
            <div class="metrics-table" id="metricsTable"></div>
          </section>
          <section class="detail-block guidance-block">
            <h3>下季度指引</h3>
            <p id="guidanceText"></p>
          </section>
          <section class="detail-block">
            <h3>业务亮点</h3>
            <ul class="highlights-list" id="highlightsList"></ul>
          </section>
          <section class="detail-block">
            <div class="chart-header">
              <h3>12 季度营收走势</h3>
            </div>
            <div class="chart-card">
              <div class="chart-y-label">Revenue (USD B)</div>
              <div class="bar-chart" id="barChart"></div>
            </div>
          </section>
          <section class="detail-block fx-block">
            <h3>汇率说明</h3>
            <p id="fxNote"></p>
          </section>
        </div>
      </div>
    </div>

    <template id="cardTemplate">
      <article class="company-card">
        <div class="card-header">
          <div>
            <h3></h3>
            <p class="company-subtitle"></p>
          </div>
          <div class="card-badges">
            <span class="status-pill"></span>
            <span class="quarter-tag"></span>
          </div>
        </div>
        <div class="card-meta">
          <span class="sector-pill"></span>
        </div>
        <div class="card-body"></div>
        <p class="track-copy"></p>
      </article>
    </template>

    <script src="./data/earnings-dashboard.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
