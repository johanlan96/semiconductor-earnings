name: Update Financial Data

on:
  # 每周日北京时间 10:00 触发 (UTC 02:00)
  schedule:
    - cron: '0 2 * * 0'
  # 也允许手动触发（在 Actions 页面点 Run workflow）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run data fetcher
        run: python3 fetch_financials.py

      - name: Check for changes
        id: check_changes
        run: |
          if git diff --quiet semiconductor_earnings.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No data changes detected, skipping commit."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Data updated, will commit."
          fi

      - name: Commit and push
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add semiconductor_earnings.html
          DATE=$(date -u +"%Y-%m-%d")
          git commit -m "auto: update financial data ($DATE)"
          git push
